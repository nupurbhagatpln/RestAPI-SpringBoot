spring.application.name=learningRestAPIS 
# Values come from environment variables set on the hosting platform.
# Locally, create a .env or export these in your shell before running.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
 
# Comma-separated list of origins allowed to call this API, read by CorsConfig.
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
 
server.port=${PORT:8080}
